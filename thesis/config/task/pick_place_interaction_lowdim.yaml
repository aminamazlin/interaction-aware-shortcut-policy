name: mimicgen_pick_place_interaction_d0_lowdim

obs_dim: 65
action_dim: 7
keypoint_dim: 0
num_palm_stages: 8
num_palm_objects: 4

obs_keys: &obs_keys
  - robot0_eef_pos
  - robot0_eef_quat
  - robot0_gripper_qpos
  - object

palm_object_names: &palm_object_names
  - milk
  - bread
  - cereal
  - can

dataset_path: &dataset_path ${oc.env:PROJECT_STORAGE_ROOT,/gpfs/work5/0/prjs2121/amazlin/bachelor-thesis}/training_data/pickPlace/pick_place_demo.hdf5
abs_action: &abs_action false

env_runner:
  _target_: thesis.env.runners.mimicgen_runner.MimicGenLowdimRunner
  dataset_path: *dataset_path
  task_name: PickPlace_D0
  obs_keys: *obs_keys
  robosuite_kwargs:
    robots: Sawyer
  n_train: 6
  n_train_vis: 2
  train_start_seed: 0
  n_test: 50
  n_test_vis: 4
  test_start_seed: 100000
  max_steps: 1000
  n_obs_steps: ${n_obs_steps}
  n_action_steps: ${n_action_steps}
  n_latency_steps: ${n_latency_steps}
  render_hw: [128, 128]
  fps: 10
  crf: 22
  past_action: ${past_action_visible}
  abs_action: *abs_action
  n_envs: 28

dataset:
  _target_: thesis.dataset.mimicgen_palm_state_lowdim_dataset.MimicGenInteractionStateLowdimDataset
  dataset_path: *dataset_path
  horizon: ${horizon}
  n_obs_steps: ${n_obs_steps}
  n_action_steps: ${n_action_steps}
  pad_before: ${eval:'${n_obs_steps}-1+${n_latency_steps}'}
  pad_after: ${eval:'${n_action_steps}-1'}
  obs_keys: *obs_keys
  subgoal_signals: pick_place
  object_names: *palm_object_names
  motion_delta_offset: ${n_action_steps}
  seed: 42
  val_ratio: 0.02
  max_train_episodes: null
  use_cache: true
  cache_zarr_path: ${oc.env:PROJECT_STORAGE_ROOT,/gpfs/work5/0/prjs2121/amazlin/bachelor-thesis}/training_data/pickPlace/pick_place_demo_lowdim_65_palm_state.zarr
