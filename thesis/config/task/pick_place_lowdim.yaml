name: mimicgen_pick_place_d0_lowdim

# Required by train configs that reference ${task.obs_dim}, ${task.action_dim}
# Obs-dim breakdown:
#   robot0_eef_pos       3
#   robot0_eef_quat      4
#   robot0_gripper_qpos  2
#   object              56
#   ----------------------
#   total               65
obs_dim: 65
action_dim: 7       # OSC_POSE (6D) + gripper (1)
keypoint_dim: 0

obs_keys: &obs_keys
  - robot0_eef_pos
  - robot0_eef_quat
  - robot0_gripper_qpos
  - object

dataset_path: &dataset_path ${oc.env:PROJECT_STORAGE_ROOT,/gpfs/work5/0/prjs2121/amazlin/bachelor-thesis}/training_data/pickPlace/pick_place_demo.hdf5
abs_action: &abs_action false

env_runner:
  _target_: thesis.env.runners.mimicgen_runner.MimicGenLowdimRunner
  dataset_path: *dataset_path
  task_name: PickPlace_D0
  obs_keys: *obs_keys
  robosuite_kwargs:
    robots: Sawyer
  n_train: 6
  n_train_vis: 2
  train_start_seed: 0
  n_test: 50
  n_test_vis: 4
  test_start_seed: 100000
  max_steps: 1000
  n_obs_steps: ${n_obs_steps}
  n_action_steps: ${n_action_steps}
  n_latency_steps: ${n_latency_steps}
  render_hw: [128, 128]
  fps: 10
  crf: 22
  past_action: ${past_action_visible}
  abs_action: *abs_action
  n_envs: 28

dataset:
  _target_: thesis.dataset.mimicgen_lowdim_dataset.MimicGenLowdimDataset
  dataset_path: *dataset_path
  horizon: ${horizon}
  n_obs_steps: ${n_obs_steps}
  n_action_steps: ${n_action_steps}
  pad_before: ${eval:'${n_obs_steps}-1+${n_latency_steps}'}
  pad_after: ${eval:'${n_action_steps}-1'}
  obs_keys: *obs_keys
  seed: 42
  val_ratio: 0.02
  max_train_episodes: null
  use_cache: true
  cache_zarr_path: ${oc.env:PROJECT_STORAGE_ROOT,/gpfs/work5/0/prjs2121/amazlin/bachelor-thesis}/training_data/pickPlace/pick_place_demo_lowdim_65.hdf5.zarr
