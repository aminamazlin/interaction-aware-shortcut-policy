name: mug_cleanup_interaction_d0_lowdim

# MugCleanup lowdim observations plus PALM-style derived labels.
# Obs-dim breakdown:
#   robot0_eef_pos       3
#   robot0_eef_quat      4
#   robot0_gripper_qpos  2
#   object              29
#   total               38
obs_dim: 38
action_dim: 7
keypoint_dim: 0
num_palm_stages: 5
num_palm_objects: 2

obs_keys: &obs_keys
  - robot0_eef_pos
  - robot0_eef_quat
  - robot0_gripper_qpos
  - object

palm_object_names: &palm_object_names
  - drawer
  - object

palm_stage_names:
  - open_drawer
  - grasp_mug
  - place_mug
  - close_drawer
  - done

dataset_path: &dataset_path ${oc.env:PROJECT_STORAGE_ROOT,/gpfs/work5/0/prjs2121/amazlin/bachelor-thesis}/training_data/mug_cleanup/mug_cleanup_demo.hdf5
abs_action: &abs_action false

env_runner:
  _target_: thesis.env.runners.mimicgen_runner.MimicGenLowdimRunner
  dataset_path: *dataset_path
  task_name: MugCleanup_D0
  obs_keys: *obs_keys
  n_train: 6
  n_train_vis: 2
  train_start_seed: 0
  n_test: 50
  n_test_vis: 4
  test_start_seed: 100000
  max_steps: 500
  n_obs_steps: ${n_obs_steps}
  n_action_steps: ${n_action_steps}
  n_latency_steps: ${n_latency_steps}
  render_hw: [128, 128]
  fps: 10
  crf: 22
  past_action: ${past_action_visible}
  abs_action: *abs_action
  n_envs: 28

dataset:
  _target_: thesis.dataset.mimicgen_palm_state_lowdim_dataset.MimicGenInteractionStateLowdimDataset
  dataset_path: *dataset_path
  horizon: ${horizon}
  n_obs_steps: ${n_obs_steps}
  n_action_steps: ${n_action_steps}
  pad_before: ${eval:'${n_obs_steps}-1+${n_latency_steps}'}
  pad_after: ${eval:'${n_action_steps}-1'}
  obs_keys: *obs_keys
  subgoal_signals: mug_cleanup_full
  object_names: *palm_object_names
  final_object_name: drawer
  motion_delta_offset: ${n_action_steps}
  seed: 42
  val_ratio: 0.02
  max_train_episodes: null
  use_cache: true
  cache_zarr_path: ${oc.env:PROJECT_STORAGE_ROOT,/gpfs/work5/0/prjs2121/amazlin/bachelor-thesis}/training_data/mug_cleanup/mug_cleanup_demo_lowdim_38_palm_state_5stage.zarr
