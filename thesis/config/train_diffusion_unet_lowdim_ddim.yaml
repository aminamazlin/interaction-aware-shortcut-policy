defaults:
  - task: pick_place_lowdim
  - _self_

name: train_diffusion_unet_lowdim_ddim
_target_: thesis.workspace.diffusion_unet_lowdim_workspace.TrainDiffusionUnetLowdimWorkspace

task_name: ${task.name}
obs_dim: ${task.obs_dim}
action_dim: ${task.action_dim}
exp_name: default
output_dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}

horizon: 16
n_obs_steps: 4
n_action_steps: 8
n_latency_steps: 0
past_action_visible: false
keypoint_visible_rate: 1.0
obs_as_local_cond: false
obs_as_global_cond: true
pred_action_steps_only: false

policy:
  _target_: thesis.policy.diffusion_unet_lowdim_policy.DiffusionUnetLowdimPolicy
  noise_scheduler:
    _target_: diffusers.schedulers.scheduling_ddim.DDIMScheduler
    num_train_timesteps: 100
    beta_start: 0.0001
    beta_end: 0.02
    beta_schedule: squaredcos_cap_v2
    clip_sample: true
    set_alpha_to_one: true
    steps_offset: 0
    prediction_type: epsilon
  obs_dim: ${obs_dim}
  action_dim: ${action_dim}
  horizon: ${horizon}
  n_action_steps: ${eval:'${n_action_steps}+${n_latency_steps}'}
  n_obs_steps: ${n_obs_steps}
  num_inference_steps: 8
  obs_as_local_cond: ${obs_as_local_cond}
  obs_as_global_cond: ${obs_as_global_cond}
  pred_action_steps_only: ${pred_action_steps_only}
  oa_step_convention: true
  diffusion_step_embed_dim: 256
  down_dims: [256, 512, 1024]
  kernel_size: 5
  n_groups: 8
  cond_predict_scale: true

ema:
  _target_: thesis.model.diffusion.ema_model.EMAModel
  update_after_step: 0
  inv_gamma: 1.0
  power: 0.75
  min_value: 0.0
  max_value: 0.9999

optimizer:
  _target_: torch.optim.AdamW
  lr: 1.0e-4
  betas: [0.95, 0.999]
  eps: 1.0e-8
  weight_decay: 1.0e-6

training:
  device: cuda:0
  seed: 42
  debug: false
  resume: false
  freeze_encoder: false
  lr_scheduler: cosine
  lr_warmup_steps: 500
  num_epochs: 2000
  gradient_accumulate_every: 1
  use_ema: true
  rollout_every: 20
  checkpoint_every: 20
  val_every: 1
  sample_every: 5
  max_train_steps: null
  max_val_steps: null
  tqdm_interval_sec: 1.0

dataloader:
  batch_size: 1024
  num_workers: 8
  shuffle: true
  pin_memory: true
  persistent_workers: true
  pad_last_batch: true

val_dataloader:
  batch_size: 1024
  num_workers: 0
  shuffle: false
  pin_memory: true
  persistent_workers: false

logging:
  project: experiment_tasks
  resume: false
  mode: online
  name: ${now:%Y.%m.%d-%H.%M.%S}_${name}_${task_name}
  tags: ["diffusion_unet", "ddim", "lowdim", "${task_name}", "${exp_name}"]
  id: null
  group: null

checkpoint:
  topk:
    monitor_key: test_mean_score
    mode: max
    k: 5
    format_str: 'epoch={epoch:04d}-test_mean_score={test_mean_score:.3f}.ckpt'
  save_last_ckpt: true
  save_last_snapshot: false

hydra:
  job:
    override_dirname: ${name}
  run:
    dir: ${output_dir}
  sweep:
    dir: ${output_dir}
    subdir: ${hydra.job.num}
