defaults:
  - task: franka_kitchen_interaction_lowdim
  - _self_

name: train_interaction_aware_shortcut_lowdim
_target_: thesis.workspace.interaction_aware_shortcut_workspace.TrainInteractionAwareShortcutWorkspace

task_name: ${task.name}
obs_dim: ${task.obs_dim}
action_dim: ${task.action_dim}
exp_name: default
output_dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}

horizon: 16
n_obs_steps: 4
n_action_steps: 8
n_latency_steps: 0
past_action_visible: false
obs_as_global_cond: true
pred_action_steps_only: false

policy:
  _target_: thesis.policy.interaction_aware_shortcut_policy.InteractionAwareShortcutPolicy
  obs_dim: ${obs_dim}
  action_dim: ${action_dim}
  horizon: ${horizon}
  n_action_steps: ${eval:'${n_action_steps}+${n_latency_steps}'}
  n_obs_steps: ${n_obs_steps}
  num_inference_steps: 1
  denoise_timesteps: ${loss.denoise_timesteps}
  bootstrap_every: ${loss.bootstrap_every}
  use_warm_start: true
  warm_start_t: 0.15
  obs_as_global_cond: ${obs_as_global_cond}
  pred_action_steps_only: ${pred_action_steps_only}
  oa_step_convention: true
  diffusion_step_embed_dim: 256
  shortcut_step_embed_dim: 256
  down_dims: [256, 512, 1024]
  kernel_size: 5
  n_groups: 8
  cond_predict_scale: true
  clip_sample: ${loss.clip_sample}
  null_cond_init_std: 0.0
  num_interaction_stages: ${task.num_interaction_stages}
  num_interaction_objects: ${task.num_interaction_objects}
  interaction_query_dim: 128
  interaction_context_dim: 128
  interaction_num_heads: 4
  interaction_num_layers: 2
  interaction_dropout: 0.0
  predict_action_progress: true

loss:
  denoise_timesteps: 128
  bootstrap_every: 5
  bootstrap_ema: true
  discrete_time: false
  clip_sample: 4.0
  lambda_flow: 1.0
  lambda_self_consistency: 1.0
  lambda_action_progress_flow: 0.1
  lambda_self_guidance: 0.0
  scale_self_guidance_by_ratio: true
  guidance_every: 0
  condition_dropout: 0.0
  lambda_interaction_stage: 0.1
  lambda_interaction_progress: 0.1
  lambda_interaction_object: 0.1
  lambda_interaction_contact: 1.0
  lambda_interaction_place: 1.0
  lambda_interaction_motion: 1.0
  interaction_aux_schedule_enabled: false
  interaction_aux_schedule: cosine_decay
  interaction_aux_schedule_start_scale: 1.0
  interaction_aux_schedule_end_scale: 0.5
  interaction_aux_schedule_decay_start: 0.025
  interaction_aux_schedule_decay_end: 0.06
  interaction_aux_schedule_power: 1.0
  time_contract_start: 1.0
  time_contract_end: 0.0
  time_contract_schedule: polynomial
  time_contract_power: 2.0
  t_sampler: beta
  t_beta_alpha: 1.0
  t_beta_beta: 1.5
  interval_sampler: log_normal
  interval_mu: -0.2
  interval_sigma: 1.0
  min_self_consistency_step: 1.0e-4

ema:
  _target_: thesis.model.diffusion.ema_model.EMAModel
  update_after_step: 0
  inv_gamma: 1.0
  power: 0.75
  min_value: 0.0
  max_value: 0.9999

optimizer:
  _target_: torch.optim.AdamW
  lr: 1.0e-4
  weight_decay: 1.0e-6
  betas: [0.95, 0.999]

training:
  device: cuda:0
  seed: 42
  debug: false
  resume: false
  freeze_encoder: false
  lr_scheduler: cosine
  lr_warmup_steps: 500
  num_epochs: 2000
  gradient_accumulate_every: 1
  use_ema: true
  rollout_every: 20
  checkpoint_every: 20
  val_every: 1
  sample_every: 5
  max_train_steps: null
  max_val_steps: null
  tqdm_interval_sec: 1.0

dataloader:
  batch_size: 1024
  num_workers: 8
  shuffle: true
  pin_memory: true
  persistent_workers: true
  drop_last: true

val_dataloader:
  batch_size: 1024
  num_workers: 0
  shuffle: false
  pin_memory: true
  persistent_workers: false

logging:
  project: experiment_tasks
  resume: false
  mode: online
  name: ${now:%Y.%m.%d-%H.%M.%S}_${name}_${task_name}
  tags: ["interaction_aware_shortcut", "interaction_queries", "action_progress", "self_consistency", "lowdim", "${task_name}", "${exp_name}"]
  id: null
  group: null

checkpoint:
  topk:
    monitor_key: test_mean_score
    mode: max
    k: 5
    format_str: 'epoch={epoch:04d}-test_mean_score={test_mean_score:.3f}.ckpt'
  save_last_ckpt: true
  save_last_snapshot: false

hydra:
  job:
    override_dirname: ${name}
  run:
    dir: ${output_dir}
  sweep:
    dir: ${output_dir}
    subdir: ${hydra.job.num}
